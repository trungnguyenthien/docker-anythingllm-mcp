version: '3.8'

services:
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    container_name: anythingllm
    ports:
      - "3901:3001"
    cap_add:
      - SYS_ADMIN
    environment:
      # Đường dẫn lưu trữ bên trong container
      - STORAGE_DIR=/app/server/storage
    volumes:
      # Ánh xạ thư mục dữ liệu ra máy thật để không mất data khi xóa container
      - ./storage:/app/server/storage
    restart: always